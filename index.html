let _sid = 0;
class Slime {
constructor(x, y, r, pi) {
this.id = _sid++;
this.x = x; this.y = y;
this.vx = 0; this.vy = 0;
this.radius = r;
this.pi = (pi !== undefined && pi !== null) ? pi : Math.floor(Math.random() * 3);
this.hp = r * 3 + waveNum * 6;
this.maxHp = this.hp;
this.xpV = Math.max(2, Math.round(r * 0.7));
this.dead = false;
this.sc = 0; // spawn scale 0→1
this.flashT = 0;
this.eyeA = 0;
this.throwT = 4 + Math.random() * 5; // 体ちぎり投げクールダウン
this.blinkPh = ‘wait’; this.blinkT = 2 + Math.random() * 3;

// ── スライム形状の核心 ──────────────────────────────────────
// N個の制御点。各点が独立した周波数・位相・振幅で振動する
this.N = 9 + Math.floor(Math.random() * 5); // 9〜13点
this.pts = [];
for (let i = 0; i < this.N; i++) {
  this.pts.push({
    // ベース角度からのランダムオフセット（形の非対称性）
    aOff: (Math.random() - 0.5) * 0.55,
    // 半径の基本スケール（0.72〜1.28）→ でこぼこ感
    rBase: 0.72 + Math.random() * 0.56,
    // 振動パラメータ
    ph: Math.random() * Math.PI * 2,
    fr: 0.4 + Math.random() * 1.2,
    am: 0.06 + Math.random() * 0.18,
  });
}
// スクワッシュ&ストレッチ（速度方向に変形）
this.sqAng = 0; this.sqStr = 1; this.sqSq = 1;

}

spd() {
return 28 + (60 - Math.min(60, this.radius)) * 0.4 + waveNum * 2.2;
}

// ブロブ頂点を計算して返す（これがスライムの魂）
blobPts(t) {
const result = [];
for (let i = 0; i < this.N; i++) {
const p = this.pts[i];
const baseA = (i / this.N) * Math.PI * 2 + p.aOff;
// 振動する半径
const r = this.radius * this.sc * p.rBase * (1 + Math.sin(t * p.fr + p.ph) * p.am);
// スクワッシュ&ストレッチ変形
const ca = Math.cos(this.sqAng), sa = Math.sin(this.sqAng);
const px = Math.cos(baseA) * r, py = Math.sin(baseA) * r;
const along = px * ca + py * sa;
const perp = -px * sa + py * ca;
result.push({
x: this.x + along * this.sqStr * ca - perp * this.sqSq * sa,
y: this.y + along * this.sqStr * sa + perp * this.sqSq * ca,
});
}
return result;
}

// ブロブをパスとして描く
drawPath(pts) {
const n = pts.length;
ctx.beginPath();
for (let i = 0; i < n; i++) {
const c = pts[i], nx = pts[(i + 1) % n];
const mx = (c.x + nx.x) * 0.5, my = (c.y + nx.y) * 0.5;
if (i === 0) ctx.moveTo(mx, my);
else ctx.quadraticCurveTo(c.x, c.y, mx, my);
}
const lx = (pts[n - 1].x + pts[0].x) * 0.5, ly = (pts[n - 1].y + pts[0].y) * 0.5;
ctx.quadraticCurveTo(pts[n - 1].x, pts[n - 1].y, lx, ly);
ctx.closePath();
}

update(dt) {
this.sc = Math.min(1, this.sc + dt * 5);
if (!player) return;
const dx = player.x - this.x, dy = player.y - this.y;
const d = Math.sqrt(dx * dx + dy * dy) || 1;
const sp = this.spd();
this.vx += (dx / d) * sp * dt * 5;
this.vy += (dy / d) * sp * dt * 5;
const cs = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
if (cs > sp) { this.vx = this.vx / cs * sp; this.vy = this.vy / cs * sp; }
this.eyeA = Math.atan2(dy, dx);
this.x += this.vx * dt; this.y += this.vy * dt;
this.vx *= Math.pow(0.55, dt); this.vy *= Math.pow(0.55, dt);

// スクワッシュ&ストレッチ
const mv = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
const ratio = Math.min(1, mv / (sp || 1));
const strT = 1 + ratio * 0.45;
const sqT = 1 / Math.sqrt(strT);
const angT = Math.atan2(this.vy, this.vx);
const k = mv > 5 ? Math.min(1, dt * 12) : Math.min(1, dt * 7);
this.sqStr += (strT - this.sqStr) * k;
this.sqSq += (sqT - this.sqSq) * k;
if (mv > 8) {

  while (da > Math.PI) da -= Math.PI * 2;
  while (da < -Math.PI) da += Math.PI * 2;

}

// まばたき

}

drawEyes(sr) {
const er = Math.max(2, sr * 0.18), sep = sr * 0.30;
const fx = this.x + Math.cos(this.eyeA) * sr * 0.34;
const fy = this.y + Math.sin(this.eyeA) * sr * 0.34;
const px = Math.cos(this.eyeA + Math.PI / 2) * sep;
const py = Math.sin(this.eyeA + Math.PI / 2) * sep;
const eyes = [{ x: fx + px, y: fy + py }, { x: fx - px, y: fy - py }];
if (sr > 40) eyes.push({ x: fx, y: fy + sr * 0.22 });
const blink = this.blinkPh === ‘blink’;
for (const e of eyes) {
ctx.fillStyle = ‘#fff’;
ctx.beginPath();
if (blink) ctx.ellipse(e.x, e.y, er, er * 0.1, 0, 0, Math.PI * 2);
else ctx.arc(e.x, e.y, er, 0, Math.PI * 2);
ctx.fill();
if (!blink) {
const po = er * 0.25;
ctx.fillStyle = ‘#0a0a14’;
ctx.beginPath();
ctx.arc(e.x + Math.cos(this.eyeA) * po, e.y + Math.sin(this.eyeA) * po, er * 0.55, 0, Math.PI * 2);
ctx.fill();
ctx.fillStyle = ‘#fff’;
ctx.beginPath();
ctx.arc(e.x + Math.cos(this.eyeA) * po - er * 0.15, e.y + Math.sin(this.eyeA) * po - er * 0.15, er * 0.2, 0, Math.PI * 2);
ctx.fill();
}
}
}

// スライム間のネック（メタボール合体感）
function drawNecks(t) {
for (let i = 0; i < slimes.length; i++) {
const a = slimes[i];
if (a.x < cam.x - 120 || a.x > cam.x + W + 120) continue;
for (let j = i + 1; j < slimes.length; j++) {
const b = slimes[j];
if (b.pi !== a.pi) continue;
const dx = b.x - a.x, dy = b.y - a.y;
const dist = Math.sqrt(dx * dx + dy * dy) || 1;
const ra = a.radius * a.sc, rb = b.radius * b.sc;
const touchD = ra + rb, gap = Math.min(ra, rb) * 0.85;
if (dist > touchD + gap) continue;
const tf = 1 - Math.max(0, (dist - touchD) / gap);
const ang = Math.atan2(dy, dx), pp = ang + Math.PI / 2;
const w1 = ra * 0.5 * tf, w2 = rb * 0.5 * tf;
const ax2 = a.x + Math.cos(ang) * ra, ay2 = a.y + Math.sin(ang) * ra;
const bx2 = b.x - Math.cos(ang) * rb, by2 = b.y - Math.sin(ang) * rb;
const mx = (ax2 + bx2) * 0.5, my = (ay2 + by2) * 0.5;
ctx.save(); ctx.globalAlpha = 0.88; ctx.fillStyle = SLIME_PAL[a.pi].m;
ctx.beginPath();
ctx.moveTo(ax2 + Math.cos(pp) * w1, ay2 + Math.sin(pp) * w1);
ctx.quadraticCurveTo(mx + Math.cos(pp) * (w1 + w2) * 0.25, my + Math.sin(pp) * (w1 + w2) * 0.25, bx2 + Math.cos(pp) * w2, by2 + Math.sin(pp) * w2);
ctx.quadraticCurveTo(bx2 + Math.cos(ang) * w2 * 0.4, by2 + Math.sin(ang) * w2 * 0.4, bx2 - Math.cos(pp) * w2, by2 - Math.sin(pp) * w2);
ctx.quadraticCurveTo(mx - Math.cos(pp) * (w1 + w2) * 0.25, my - Math.sin(pp) * (w1 + w2) * 0.25, ax2 - Math.cos(pp) * w1, ay2 - Math.sin(pp) * w1);
ctx.quadraticCurveTo(ax2 - Math.cos(ang) * w1 * 0.4, ay2 - Math.sin(ang) * w1 * 0.4, ax2 + Math.cos(pp) * w1, ay2 + Math.sin(pp) * w1);
ctx.closePath(); ctx.fill(); ctx.restore();
}
}
}

// 同色融合
function mergeSlimes() {
for (let i = 0; i < slimes.length; i++) {
const a = slimes[i];
if (a.dead || a.sc < 0.65) continue;
for (let j = i + 1; j < slimes.length; j++) {
const b = slimes[j];
if (b.dead || b.sc < 0.65 || b.pi !== a.pi) continue;
const dx = b.x - a.x, dy = b.y - a.y;
if (dx * dx + dy * dy < (a.radius + b.radius) * (a.radius + b.radius) * 0.5) {
const big = a.radius >= b.radius ? a : b;
const small = a.radius >= b.radius ? b : a;
const nr = Math.min(120, Math.sqrt(big.radius * big.radius + small.radius * small.radius * 0.65));
big.x = (big.x * big.radius + small.x * small.radius) / (big.radius + small.radius);
big.y = (big.y * big.radius + small.y * small.radius) / (big.radius + small.radius);
big.radius = nr; big.hp += small.hp * 0.6; big.maxHp += small.maxHp * 0.6;
big.xpV += small.xpV; big.sc = Math.min(1.15, big.sc + 0.18);
splat(big.x, big.y, SLIME_PAL[big.pi].m, 7, 45);
small.dead = true;
}
}
}
}

// ═══════════════════════════════════════════════════════════════
class Player {
constructor() {
this.x = WW / 2; this.y = WH / 2;
this.hp = 100; this.maxHp = 100; this.speed = 140;
this.inv = 0; this.facing = 1; this.wf = 0; this.wt = 0;
this.sCount = 1; this.sSpeed = 2.5; this.sLen = 42; this.sDmg = 22;
this.xp = 0; this.xpN = 8; this.level = 1;
this.jesusT = 0; // ジーザスモード残り秒
this.swords = []; this.rebuild();
}
rebuild() {
this.swords = [];
for (let i = 0; i < this.sCount; i++) this.swords.push(new Sword(this, i, this.sCount));
}
isJesus() { return this.jesusT > 0; }
update(dt) {
// ジョイスティック移動
const mdx = joy.dx, mdy = joy.dy;
this.x = Math.max(20, Math.min(WW - 20, this.x + mdx * this.speed * dt));
this.y = Math.max(20, Math.min(WH - 20, this.y + mdy * this.speed * dt));
if (Math.abs(mdx) > 0.1) this.facing = mdx > 0 ? 1 : -1;
if (Math.abs(mdx) > 0.1 || Math.abs(mdy) > 0.1) {
this.wt += dt; if (this.wt > 0.16) { this.wt = 0; this.wf ^= 1; }
}

function splat(x, y, c, n, sp) {
for (let i = 0; i < n; i++) {
const a = Math.random() * Math.PI * 2, s = sp * 0.5 + Math.random() * sp;
particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 16, r: 2 + Math.random() * 3, c, life: 0.3 + Math.random() * 0.35, ml: 0.65 });
}
}
function updParticles(dt) {
for (let i = particles.length - 1; i >= 0; i–) {
const p = particles[i];
p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 50 * dt;
p.vx *= Math.pow(0.22, dt); p.life -= dt;
if (p.life <= 0) particles.splice(i, 1);
}
for (let i = magicParts.length - 1; i >= 0; i–) {
const p = magicParts[i];
p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
if (p.life <= 0) magicParts.splice(i, 1);
}
}
function drawParticles() {
for (const p of particles) {
const a = Math.max(0, p.life / p.ml);
ctx.globalAlpha = a; ctx.fillStyle = p.c;
ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2); ctx.fill();
}
for (const p of magicParts) {
const a = Math.max(0, p.life / p.ml);
ctx.globalAlpha = a; ctx.fillStyle = p.c;
ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
}
ctx.globalAlpha = 1;
}

if(mv>5){let da=Math.atan2(this.vy,this.vx)-this.sqAng;while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;this.sqAng+=da*Math.min(1,dt*10);}
// まばたき
this.blinkT-=dt;if(this.blinkT<0){if(this.blinkPh===‘wait’){this.blinkPh=‘blink’;this.blinkT=0.1;}else{this.blinkPh=‘wait’;this.blinkT=1.5+Math.random()*2;}}
if(this.flashT>0)this.flashT-=dt;
// 接触ダメージ（超強力）
if(player&&player.inv<=0){const ex=this.x-player.x,ey=this.y-player.y;if(ex*ex+ey*ey<(this.radius*this.sc+16)*(this.radius*this.sc+16))player.hit(18);}
// 攻撃
if(this.sc>=0.8){this.attackT-=dt;if(this.attackT<=0){this.doAttack();this.attackT=2+Math.random()*1.5;}}
}
doAttack() {
if(!player)return;
const dx=player.x-this.x,dy=player.y-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;
const phase=Math.floor(this.phase/8)%3; // フェーズで攻撃変化
// 全方位弾
const n=6+phase*3;
for(let i=0;i<n;i++){
const a=(i/n)*Math.PI*2;
slimeBullets.push({x:this.x+Math.cos(a)*this.radius,y:this.y+Math.sin(a)*this.radius,vx:Math.cos(a)*200,vy:Math.sin(a)*200,r:16,pi:4,life:2.5,phase:0,dmg:14,isBoss:true});
}
// プレイヤー方向への集中弾
for(let i=0;i<3;i++){const sp=(i-1)*0.25;const a=Math.atan2(dy,dx)+sp;slimeBullets.push({x:this.x+Math.cos(a)*this.radius,y:this.y+Math.sin(a)*this.radius,vx:Math.cos(a)*260,vy:Math.sin(a)*260,r:18,pi:0,life:2.8,phase:0,dmg:18,isBoss:true});}
splat(this.x,this.y,’#cc0033’,8,60);
if(navigator.vibrate)navigator.vibrate(30);
}
hit(dmg) {
this.hp-=dmg; this.flashT=0.06;
if(this.hp<=0)this.die();
}
die() {
this.dead=true; satan=null;
score+=10000;
for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2,r=Math.random()*this.radius*.6;xpOrbs.push(new XPOrb(this.x+Math.cos(a)*r,this.y+Math.sin(a)*r,12));}
for(let i=0;i<25;i++){const a=Math.random()*Math.PI*2,s=40+Math.random()*140;particles.push({x:this.x,y:this.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-25,r:6+Math.random()*10,c:[’#cc0033’,’#ff4400’,’#ff0066’,’#880033’][Math.floor(Math.random()*4)],life:1+Math.random(),ml:2});}
triggerClear();
}
draw(t) {
if(this.sc<.02)return;
const sr=this.radius*this.sc;
const pts=this.blobPts(t);
// 禍々しいオーラ（複数層）
ctx.save();
for(let layer=0;layer<3;layer++){
const lr=sr*(1.4+layer*0.4);
const ag=ctx.createRadialGradient(this.x,this.y,sr*.3,this.x,this.y,lr);
const alpha=Math.sin(t*3+layer*1.5)*.5+.5;
ag.addColorStop(0,`rgba(180,0,50,${.08*alpha})`);
ag.addColorStop(1,‘rgba(0,0,0,0)’);
ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(this.x,this.y,lr,0,Math.PI*2); ctx.fill();
}
ctx.restore();
// 落ち影
ctx.save(); ctx.fillStyle=‘rgba(0,0,0,0.4)’; ctx.beginPath(); ctx.ellipse(this.x+6,this.y+sr*.6,sr,sr*.32,0,0,Math.PI*2); ctx.fill(); ctx.restore();
// ボディ
if(this.flashT>0){this.drawPath(pts);ctx.fillStyle=’#ffffff’;ctx.fill();}
else {
// 深い赤紫のグラデ
this.drawPath(pts);
const gr=ctx.createRadialGradient(this.x-sr*.2,this.y-sr*.25,sr*.1,this.x,this.y,sr);
gr.addColorStop(0,’#cc2244’);gr.addColorStop(.5,’#880022’);gr.addColorStop(1,’#330011’);
ctx.fillStyle=gr; ctx.fill();
// リム（炎のような縁）
this.drawPath(pts);
ctx.strokeStyle=’#ff3300’; ctx.lineWidth=sr*.18; ctx.globalAlpha=.5; ctx.stroke(); ctx.globalAlpha=1;
// 内側ハイライト（暗い）
ctx.save(); ctx.translate(this.x,this.y); ctx.scale(.58,.54); ctx.translate(-this.x,-this.y+sr*.1);
this.drawPath(pts); ctx.fillStyle=’#ff2244’; ctx.globalAlpha=.22; ctx.fill(); ctx.restore(); ctx.globalAlpha=1;
// スペキュラ
ctx.fillStyle=‘rgba(255,100,100,0.7)’; ctx.beginPath(); ctx.arc(this.x-sr*.22,this.y-sr*.26,sr*.08,0,Math.PI*2); ctx.fill();
}
// 目（4つ）
if(this.flashT<=0){
const er=Math.max(6,sr*.1),sep=sr*.22;
const fx=this.x+Math.cos(this.eyeA)*sr*.28,fy=this.y+Math.sin(this.eyeA)*sr*.28;
const px2=Math.cos(this.eyeA+Math.PI/2)*sep,py2=Math.sin(this.eyeA+Math.PI/2)*sep;
const eyes=[{x:fx+px2,y:fy+py2},{x:fx-px2,y:fy-py2},{x:fx+px2*.4,y:fy+py2*.4-sr*.18},{x:fx-px2*.4,y:fy-py2*.4-sr*.18}];
const blink=this.blinkPh===‘blink’;
for(const e of eyes){
ctx.fillStyle=’#ffcc00’; ctx.beginPath();
if(blink)ctx.ellipse(e.x,e.y,er,er*.08,0,0,Math.PI*2);
else ctx.arc(e.x,e.y,er,0,Math.PI*2); ctx.fill();
if(!blink){ctx.fillStyle=’#200000’;ctx.beginPath();const po=er*.2;ctx.arc(e.x+Math.cos(this.eyeA)*po,e.y+Math.sin(this.eyeA)*po,er*.55,0,Math.PI*2);ctx.fill();}
}
}
// HPバー（超大）
const bw=sr*2.5,bh=8,bx=this.x-bw/2,by2=this.y-sr*1.45-14;
ctx.fillStyle=’#200000’; ctx.fillRect(bx-1,by2-1,bw+2,bh+2);
const hr=this.hp/this.maxHp;
const hc=hr>0.6?’#cc2244’:hr>0.3?’#ff4400’:’#ff0000’;
ctx.fillStyle=hc; ctx.fillRect(bx,by2,bw*hr,bh);
ctx.strokeStyle=’#ff3300’; ctx.lineWidth=1.5; ctx.strokeRect(bx-1,by2-1,bw+2,bh+2);
// 名前
ctx.save(); ctx.textAlign=‘center’; ctx.font=‘bold 13px serif’;
ctx.fillStyle=’#ff4444’; ctx.shadowColor=’#cc0000’; ctx.shadowBlur=12;
ctx.fillText(’[FIRE] サタンスライム [FIRE]’,this.x,by2-7);
ctx.restore();
}
}

function updSlimeBullets(dt) {
for (let i = slimeBullets.length - 1; i >= 0; i–) {
const b = slimeBullets[i];
b.x += b.vx * dt; b.y += b.vy * dt;
b.vy += 30 * dt; // 弱い重力
b.vx *= Math.pow(0.55, dt); // 空気抵抗
b.life -= dt;
b.phase += dt * 8; // ぷるぷる
// プレイヤーとの当たり判定
if (player && player.inv <= 0) {
const dx = player.x - b.x, dy = player.y - b.y;
if (dx*dx+dy*dy < (b.r+14)*(b.r+14)) {
player.hit(b.dmg);
splat(b.x, b.y, SLIME_PAL[b.pi].m, 5, 40);
slimeBullets.splice(i, 1); continue;
}
}
if (b.life <= 0) {
splat(b.x, b.y, SLIME_PAL[b.pi].m, 4, 25);
slimeBullets.splice(i, 1);
}
}
}
function drawSlimeBullets() {
for (const b of slimeBullets) {
const pal = SLIME_PAL[b.pi];
const lifeR = b.life / 2.2;
const wobble = 1 + Math.sin(b.phase) * 0.18;
ctx.save();
ctx.globalAlpha = Math.min(1, lifeR * 2);
// 本体
ctx.fillStyle = pal.m;
ctx.beginPath();
ctx.ellipse(b.x, b.y, b.r * wobble, b.r / wobble, Math.atan2(b.vy, b.vx) + Math.PI/2, 0, Math.PI*2);
ctx.fill();
// リム
ctx.strokeStyle = pal.d; ctx.lineWidth = b.r * 0.2; ctx.globalAlpha *= 0.5;
ctx.stroke();
// スペキュラ
ctx.globalAlpha = Math.min(1, lifeR * 2) * 0.7;
ctx.fillStyle = ‘rgba(255,255,255,0.8)’;
ctx.beginPath(); ctx.arc(b.x - b.r*0.2, b.y - b.r*0.2, b.r*0.18, 0, Math.PI*2); ctx.fill();
ctx.restore();
}
}

const UPGRADES = [
{ n: ‘剣 +1’, d: ‘剣の本数が増える’, fn: p => { p.sCount = Math.min(p.sCount + 1, 6); p.rebuild(); } },
{ n: ‘剣速 UP’, d: ‘剣の回転が速くなる’, fn: p => { p.sSpeed *= 1.28; } },
{ n: ‘剣力 UP’, d: ‘攻撃ダメージが上がる’, fn: p => { p.sDmg += 18; } },
{ n: ‘剣長 UP’, d: ‘剣がどんどん伸びる’, fn: p => { p.sLen += 18; } },
{ n: ‘HP回復’, d: ‘HPを大きく回復’, fn: p => { p.hp = Math.min(p.maxHp, p.hp + 60); } },
{ n: ‘HP UP’, d: ‘最大HPが増える’, fn: p => { p.maxHp += 30; p.hp = Math.min(p.hp + 30, p.maxHp); } },
];
function doLevelUp() {
if (state !== ‘play’ && state !== ‘jesus’) return;
const prev = state;
state = ‘levelup’;
// ジーザスモード中はlevelup後に戻す先を保存
levelChoices._prevState = prev;
levelChoices = […UPGRADES].sort(() => Math.random() - 0.5).slice(0, 3);
}
function tapLevelUp(tx, ty) {
if (state !== ‘levelup’) return;
const cw = W * 0.82, ch = 70, cx = (W - cw) / 2, cy0 = 130, gap = 82;
for (let i = 0; i < levelChoices.length; i++) {
const cy = cy0 + i * gap;
if (tx >= cx && tx <= cx + cw && ty >= cy && ty <= cy + ch) {
levelChoices[i].fn(player); state = levelChoices._prevState || ‘play’; return;
}
}
}
function drawLevelUp() {
ctx.fillStyle = ‘rgba(0,0,12,0.88)’; ctx.fillRect(0, 0, W, H);
ctx.save(); ctx.textAlign = ‘center’; ctx.shadowBlur = 16; ctx.shadowColor = PAL.xp;
ctx.fillStyle = PAL.wave; ctx.font = ‘bold 20px monospace’; ctx.fillText(’[UP] LEVEL UP !’, W / 2, 72);
ctx.shadowBlur = 0; ctx.fillStyle = ‘#aaa’; ctx.font = ‘11px monospace’; ctx.fillText(`Level ${player.level}`, W / 2, 92);
ctx.restore();
const cw = W * 0.82, ch = 70, cx = (W - cw) / 2, cy0 = 130, gap = 82;
levelChoices.forEach((u, i) => {
const cy = cy0 + i * gap;
ctx.fillStyle = ‘#05100a’; ctx.fillRect(cx, cy, cw, ch);
ctx.strokeStyle = ‘#3aaa40’; ctx.lineWidth = 2; ctx.strokeRect(cx, cy, cw, ch);
ctx.fillStyle = PAL.xp; ctx.font = ‘bold 14px monospace’; ctx.textAlign = ‘left’; ctx.fillText(u.n, cx + 13, cy + 26);
ctx.fillStyle = ‘#999’; ctx.font = ‘11px monospace’; ctx.fillText(u.d, cx + 13, cy + 50);
});
ctx.textAlign = ‘left’;
}

// ═══════════════════════════════════════════════════════════════
// WAVE SPAWNING
// ═══════════════════════════════════════════════════════════════
function trySpawnBoss() {
// 祠のうち未ボス・未点灯のものに順番にボスを出す
const available = shrines.filter(s => !s.lit && !s.hasBoss);
if (available.length === 0) return;
// 最もプレイヤーに近い祠にボスを出す
if (!player) return;
available.sort((a,b)=>{
const da=(a.x-player.x)*(a.x-player.x)+(a.y-player.y)*(a.y-player.y);
const db=(b.x-player.x)*(b.x-player.x)+(b.y-player.y)*(b.y-player.y);
return da-db;
});
available[0].spawnBoss();
}
function spawnWave() {
const n = 3 + waveNum * 2;
let pending = n;
for (let i = 0; i < n; i++) {
setTimeout(() => {
pending–;
if (state === ‘gameover’) return;
const side = Math.floor(Math.random() * 4), m = 85;
const px = player ? player.x : WW / 2, py = player ? player.y : WH / 2;
let sx, sy;
if (side === 0) { sx = px - W / 2 + Math.random() * W; sy = py - H / 2 - m; }
else if (side === 1) { sx = px + W / 2 + m; sy = py - H / 2 + Math.random() * H; }
else if (side === 2) { sx = px - W / 2 + Math.random() * W; sy = py + H / 2 + m; }
else { sx = px - W / 2 - m; sy = py - H / 2 + Math.random() * H; }
sx = Math.max(30, Math.min(WW - 30, sx)); sy = Math.max(30, Math.min(WH - 30, sy));
const piIdx = waveNum <= 3 ? 0 : waveNum <= 6 ? Math.floor(Math.random() * 3) : Math.floor(Math.random() * SLIME_PAL.length);
const rMin = 16, rMax = 18 + waveNum * 6;
const sl = new Slime(sx, sy, rMin + Math.random() * (rMax - rMin), Math.random() < 0.75 ? piIdx : Math.floor(Math.random() * 3));
sl.sc = 0; slimes.push(sl);
}, i * 350);
}
}

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
function triggerClear() {
if (stageNum === 1) {
// ステージ1クリア → ステージ2へ
state = ‘stage_clear’;
clearTimer = 0;
player.jesusT = 0;
} else {
// ステージ2クリア → 真のエンディング
state = ‘jesus_clear’;
clearTimer = 0;
player.jesusT = 999;
}
}
function drawStageClear() {
clearTimer += 1/60;
const phase = Math.min(1, clearTimer / 2);
const textPhase = Math.max(0, Math.min(1, (clearTimer - 0.8) / 1.2));
ctx.fillStyle = `rgba(0,0,20,${phase * 0.82})`; ctx.fillRect(0,0,W,H);
// 炎のような演出（サタン撃破）
if(phase > 0.2){
const fg = ctx.createRadialGradient(W/2,H/2,0.01,W/2,H/2,Math.min(W,H)*0.7);
fg.addColorStop(0,`rgba(255,80,0,${(phase-0.2)/0.8*0.2})`);
fg.addColorStop(1,‘rgba(0,0,0,0)’);
ctx.fillStyle=fg; ctx.fillRect(0,0,W,H);
}
if(textPhase > 0){
ctx.save(); ctx.textAlign=‘center’; ctx.globalAlpha=textPhase;
ctx.shadowColor=’#ff6600’; ctx.shadowBlur=30;
ctx.fillStyle=’#ff8844’; ctx.font=`bold ${22+Math.sin(gTime*3)*2}px serif`;
ctx.fillText(’[FIRE] STAGE 1 CLEAR [FIRE]’, W/2, H/2-55);
ctx.shadowBlur=0; ctx.fillStyle=’#ffcc88’; ctx.font=‘13px monospace’;
ctx.fillText(‘サタンスライムを倒した！’, W/2, H/2-22);
ctx.fillStyle=’#ffffff’; ctx.font=‘12px monospace’;
ctx.fillText(`Score: ${score}`, W/2, H/2+8);
ctx.fillText(`Wave: ${waveNum}  Level: ${player?player.level:1}`, W/2, H/2+28);
ctx.shadowColor=’#ffaa00’; ctx.shadowBlur=12;
ctx.fillStyle=’#ffdd44’; ctx.font=‘bold 13px monospace’;
ctx.fillText(’> STAGE 2 へ続く…’, W/2, H/2+58);
// 5秒後に自動でステージ2開始
if(clearTimer > 5){
startStage2();
}
ctx.restore();
}
}
function startStage2() {
stageNum = 2;
// 敵・スライムをリセット、祠も再配置（より難しく）
slimes = []; xpOrbs = []; particles = []; magicParts = [];
slimeBullets = []; bosses = []; satan = null; satanWarningT = 0;
bossKills = 6; // ボスは既に6体倒している → 次のボスはさらに強い
waveNum = Math.max(waveNum, 15); // ウェーブを引き継ぎ
clearTimer = 0; wavePending = false;
// 祠HP上昇
placeWorldObjects(true);
state = ‘play’;
spawnWave();
bossAnnounce = { name: ‘STAGE 2 開始 — さらに強き闇が蘇る’, t: 5 };
}

function drawClear() {
clearTimer += 1 / 60;
const phase = Math.min(1, clearTimer / 2.5);
const textPhase = Math.max(0, Math.min(1, (clearTimer - 1.2) / 1.5));
// 画面を薄く暗くする
ctx.fillStyle = `rgba(0,0,0,${phase * 0.55})`; ctx.fillRect(0, 0, W, H);
// 中央の光（六芒星の輝きをイメージ）
if (phase > 0.3) {
const gp = (phase - 0.3) / 0.7;
const cg = ctx.createRadialGradient(W/2, H/2, 0.01, W/2, H/2, Math.min(W,H)*0.6);
cg.addColorStop(0, `rgba(220,160,255,${gp*0.18})`);
cg.addColorStop(1, “rgba(0,0,0,0)”);
ctx.fillStyle = cg; ctx.fillRect(0, 0, W, H);
}
// テキスト
if (textPhase > 0) {
ctx.save(); ctx.textAlign = “center”; ctx.globalAlpha = textPhase;
ctx.shadowColor = “#dd99ff”; ctx.shadowBlur = 28;
ctx.fillStyle = “#ffffff”; ctx.font = `bold ${28 + Math.sin(gTime * 2) * 2}px serif`;
ctx.fillText(”[STAR] STAGE 2 CLEAR [STAR]”, W/2, H/2 - 44);
ctx.shadowBlur = 0; ctx.font = “14px monospace”;
ctx.fillText(`Score: ${score}`, W/2, H/2 - 4);
ctx.fillText(`Wave: ${waveNum}  Level: ${player ? player.level : 1}`, W/2, H/2 + 22);
ctx.font = “12px monospace”; ctx.fillStyle = PAL.xp;
ctx.fillStyle=’#ffdd44’; ctx.font=‘bold 11px monospace’;
ctx.fillText(`STAGE ${stageNum} TOTAL SCORE: ${score}`, W/2, H/2+48);
if (Math.sin(gTime * 3) > 0) { ctx.fillStyle=PAL.xp; ctx.font=‘12px monospace’; ctx.fillText(“タップしてリトライ”, W/2, H/2 + 70); }
ctx.restore();
}
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function placeWorldObjects(stage2 = false) {
shrines = [];
const cx2 = WW / 2, cy2 = WH / 2, sr = Math.min(WW, WH) * 0.36;
for (let i = 0; i < 6; i++) {
const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
const sh = new Shrine(cx2 + Math.cos(a) * sr, cy2 + Math.sin(a) * sr, i);
if (stage2) { sh.hp = 500; sh.maxHp = 500; } // ステージ2は祠が硬い
shrines.push(sh);
}
// アイテム配置
items = [];
const itemDefs = [
{ type: ‘chest’, positions: [[0.15, 0.12], [0.85, 0.15], [0.50, 0.07], [0.08, 0.50], [0.92, 0.48], [0.22, 0.85], [0.78, 0.82], [0.50, 0.93]] },
{ type: ‘hp’, positions: [[0.30, 0.20], [0.70, 0.25], [0.20, 0.60], [0.80, 0.65], [0.45, 0.55]] },
{ type: ‘barrier’, positions: [[0.35, 0.40], [0.65, 0.35], [0.40, 0.75], [0.60, 0.70]] },
{ type: ‘cross’, positions: [[0.22, 0.18], [0.78, 0.22], [0.12, 0.62], [0.88, 0.58], [0.48, 0.88], [0.52, 0.12]] },
];
for (const def of itemDefs) {
for (const [rx, ry] of def.positions) {
items.push(new Item(rx * WW, ry * WH, def.type));
}
}
}

function initGame() {
player = new Player();
slimes = []; xpOrbs = []; particles = []; magicParts = []; slimeBullets = []; bosses = []; bossKills = 0; satan = null; satanWarningT = 0;
waveNum = 1; score = 0; gTime = 0; stageNum = 1; screenShake={x:0,y:0,t:0};
state = ‘play’; wavePending = false; clearTimer = 0;
cam.x = WW / 2 - W / 2; cam.y = WH / 2 - H / 2;
joy.on = false; joy.dx = 0; joy.dy = 0;
screenShake = {x:0,y:0,t:0};
placeWorldObjects();
spawnWave();
}

// タイトル用スライム
let titleSlimes = [];
function initTitle() {
titleSlimes = [];
for (let i = 0; i < 7; i++) {
const sl = new Slime(W * 0.1 + Math.random() * W * 0.8, H * 0.2 + Math.random() * H * 0.6, 14 + Math.random() * 22, Math.floor(Math.random() * 3));
sl.sc = 1; sl.sqStr = 1; sl.sqSq = 1;
titleSlimes.push(sl);
}
}

// ═══════════════════════════════════════════════════════════════
// BOSS WARNING SCREEN
// ═══════════════════════════════════════════════════════════════
function drawBossWarning() {
satanWarningT -= 1/60;
if (satanWarningT <= 0) { state = ‘play’; return; }
const f = Math.min(1, satanWarningT * 2);
ctx.fillStyle = `rgba(30,0,0,${0.85*f})`; ctx.fillRect(0,0,W,H);
ctx.save(); ctx.textAlign=‘center’; ctx.globalAlpha=f;
ctx.shadowColor=’#ff0000’; ctx.shadowBlur=30;
ctx.fillStyle=’#ff3333’; ctx.font=`bold ${24+Math.sin(gTime*8)*3}px serif`;
ctx.fillText(’[!!] WARNING [!!]’,W/2,H/2-60);
ctx.shadowBlur=20;
ctx.fillStyle=’#ffcc00’; ctx.font=‘bold 28px serif’;
ctx.fillText(‘サタンスライム’,W/2,H/2-10);
ctx.fillStyle=’#ff8888’; ctx.font=‘15px monospace’;
ctx.fillText(‘降臨！！’,W/2,H/2+25);
ctx.shadowBlur=0; ctx.fillStyle=’#ff4444’; ctx.font=‘11px monospace’;
ctx.fillText(‘全ての祠を破壊した報いを受けよ’,W/2,H/2+58);
ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// TITLE / GAMEOVER
// ═══════════════════════════════════════════════════════════════
function drawTitle() {
ctx.fillStyle = PAL.bg; ctx.fillRect(0, 0, W, H);
// タイルっぽい背景
for (let x = 0; x < W; x += 48) for (let y = 0; y < H; y += 44) {
const h = ((Math.floor(x / 48) * 12347 + Math.floor(y / 44) * 7919) * 2654435769) >>> 0;
ctx.fillStyle = (h & 7) < 2 ? PAL.tile1 : PAL.tile2;
ctx.fillRect(x + 1, y + 1, 46, 42);
}
// タイトルスライム
for (const sl of titleSlimes) sl.draw(gTime);
ctx.save(); ctx.textAlign = ‘center’;
ctx.shadowBlur = 28; ctx.shadowColor = ‘#2ecc40’;
ctx.fillStyle = ‘#90ff9a’; ctx.font = ‘bold 38px monospace’; ctx.fillText(‘SLIME’, W / 2, H / 2 - 72);
ctx.fillStyle = ‘#2ecc40’; ctx.font = ‘bold 28px monospace’; ctx.fillText(‘SURVIVORS’, W / 2, H / 2 - 28);
ctx.shadowBlur = 0;
ctx.fillStyle = ‘#558855’; ctx.font = ‘11px monospace’; ctx.fillText(‘スライムをたおせ！’, W / 2, H / 2 + 10);
const bl = Math.sin(gTime * 3.2) > 0.1;
ctx.fillStyle = bl ? ‘#e8e8e8’ : ‘#444444’; ctx.font = ‘13px monospace’;
ctx.fillText(‘タップしてスタート’, W / 2, H / 2 + 54);
ctx.restore();
}
function drawGameOver() {
ctx.fillStyle = ‘rgba(0,0,0,0.8)’; ctx.fillRect(0, 0, W, H);
ctx.textAlign = ‘center’;
ctx.fillStyle = ‘#ff3030’; ctx.font = ‘bold 26px monospace’; ctx.fillText(‘GAME OVER’, W / 2, H / 2 - 50);
ctx.fillStyle = ‘#e8e8e8’; ctx.font = ‘14px monospace’;
ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 10);
ctx.fillText(`Wave: ${waveNum}`, W / 2, H / 2 + 14);
ctx.fillText(`Level: ${player ? player.level : 1}`, W / 2, H / 2 + 38);
const bl = Math.sin(gTime * 3) > 0.1;
ctx.fillStyle = bl ? PAL.xp : ‘#335500’; ctx.font = ‘13px monospace’;
ctx.fillText(‘タップしてリトライ’, W / 2, H / 2 + 76);
ctx.textAlign = ‘left’;
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
let lastTs = 0;
function loop(ts) {
requestAnimationFrame(loop);
const dt = Math.min((ts - lastTs) / 1000, 0.05); lastTs = ts; gTime += dt;
ctx.clearRect(0, 0, C.width, C.height);

if (state === ‘title’) {
for (const sl of titleSlimes) {
sl.x += Math.sin(gTime * 0.45 + sl.id) * 0.5;
sl.y += Math.cos(gTime * 0.38 + sl.id * 1.4) * 0.42;
sl.eyeA = Math.atan2(H / 2 - sl.y, W / 2 - sl.x);
}
cam.x = 0; cam.y = 0;
drawTitle(); return;
}

if (state === ‘gameover’) {
cam.x = 0; cam.y = 0;
ctx.fillStyle = PAL.bg; ctx.fillRect(0, 0, W, H);
drawGameOver(); return;
}

// ── UPDATE ──────────────────────────────────────────────────
if (state === ‘play’ || state === ‘jesus’) {
// ウェーブ管理
if (slimes.length === 0 && !wavePending) {
wavePending = true;
setTimeout(() => { if (state === ‘play’ || state === ‘jesus’) { waveNum++; spawnWave(); } wavePending = false; }, 400);
}
player.update(dt);
// スライム上限
if (slimes.length > 55) slimes.splice(0, slimes.length - 55);
for (const sl of slimes) if (!sl.dead) sl.update(dt);
slimes = slimes.filter(s => !s.dead);
mergeSlimes(); slimes = slimes.filter(s => !s.dead);
for(const b of bosses)if(!b.dead)b.update(dt);
bosses=bosses.filter(b=>!b.dead);
if(satan&&!satan.dead)satan.update(dt); else if(satan&&satan.dead)satan=null;
updSlimeBullets(dt);
for (let i = xpOrbs.length - 1; i >= 0; i–) { xpOrbs[i].update(dt); if (xpOrbs[i].life <= 0) xpOrbs.splice(i, 1); }
for (const it of items) it.update(dt);
updParticles(dt);
camUpdate();
}
if (state === ‘jesus_clear’ || state === ‘stage_clear’) {
player.update(dt);
for (const sl of slimes) if (!sl.dead) sl.update(dt);
slimes = slimes.filter(s => !s.dead);
for (let i = xpOrbs.length - 1; i >= 0; i–) { xpOrbs[i].update(dt); if (xpOrbs[i].life <= 0) xpOrbs.splice(i, 1); }
updParticles(dt); camUpdate();
if (clearTimer > 5 && (state !== ‘jesus_clear’)) { /* wait */ }
}

// ── DRAW ────────────────────────────────────────────────────
// 画面揺れ
if(screenShake.t>0){screenShake.t-=dt;const d=screenShake.t/0.08;screenShake.x=(Math.random()-0.5)*3*d;screenShake.y=(Math.random()-0.5)*3*d;}else{screenShake.x=0;screenShake.y=0;}
ctx.save(); ctx.translate(-cam.x+screenShake.x, -cam.y+screenShake.y);
drawBg();
// アイテム
for (const it of items) it.draw();
// 祠
for (const sh of shrines) sh.draw();
// XPオーブ
for (const o of xpOrbs) o.draw(gTime);
drawSlimeBullets();
for(const b of bosses)b.draw(gTime);
if(satan)satan.draw(gTime);
// スライム
drawNecks(gTime);
for (const sl of slimes) sl.draw(gTime);
drawParticles();
if (player) player.draw();
ctx.restore();

// スクリーン空間
if (state === ‘play’ || state === ‘jesus’ || state === ‘jesus_clear’) drawHUD();
if (state === ‘levelup’) { drawHUD(); drawLevelUp(); }
if (state === ‘boss_warning’) drawBossWarning();
if (state === ‘jesus_clear’) drawClear();
if (state === ‘stage_clear’) drawStageClear();
}

// ═══════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════
// iOS Safariでwindow.innerHeightが0になる問題対策
// loadイベント後に確実に初期化する
function _startGame() {
resize();
if (!W || !H || W < 10 || H < 10) {
setTimeout(_startGame, 100);
return;
}
try {
initTitle();
} catch(e) { console.error(‘initTitle error:’, e); }
requestAnimationFrame(loop);
}
// DOMContentLoaded + 短いディレイで確実に
if (document.readyState === ‘loading’) {
document.addEventListener(‘DOMContentLoaded’, () => setTimeout(_startGame, 50));
} else {
setTimeout(_startGame, 50);
}
</script>

</body>
</html>
